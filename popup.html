<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Buddy</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Student Buddy</h1>
      <textarea
        id="textInput"
        placeholder="Paste or type text here..."
        rows="5"
      ></textarea
      ><br />
      <button id="explain" class="btn" type="button">Explain</button>
      <button id="summarise" class="btn" type="button">Summarise</button>
      <button id="quiz" class="btn" type="button">Quiz Me</button>
      <div class="result"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
